# CI pipeline for OpenMRS Core modernisation branches.
# Runs build, code-quality checks, and coverage on every push to
# modernisation-related branches and on pull requests to master.
#
# NOTE: dependency-check is intentionally excluded — it runs in a
# dedicated scheduled workflow (dependency-check.yml).

name: CI – Modernisation Branches

on:
  push:
    branches:
      - 'phase/*'
      - 'feature/*'
      - 'fix/*'
      - 'modernisation/*'
  pull_request:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  JAVA_VERSION: '21'
  JAVA_DISTRIBUTION: temurin
  MAVEN_OPTS: -Xmx1024m

jobs:
  # ──────────────────────────────────────────────
  # 1. Build & unit tests
  # ──────────────────────────────────────────────
  build:
    name: Build & Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build and run tests
        run: ./mvnw verify -B -ntp -Dspotbugs.skip=true

  # ──────────────────────────────────────────────
  # 2. Checkstyle  (source-only — no build dependency)
  # ──────────────────────────────────────────────
  checkstyle:
    name: Checkstyle
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Run Checkstyle
        run: ./mvnw checkstyle:check -B -ntp -Dcheckstyle.failOnViolation=false

  # ──────────────────────────────────────────────
  # 3. SpotBugs  (needs compiled bytecode → after build)
  # ──────────────────────────────────────────────
  spotbugs:
    name: SpotBugs
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Compile and run SpotBugs
        run: ./mvnw compile spotbugs:check -B -ntp

  # ──────────────────────────────────────────────
  # 4. Code coverage with JaCoCo  (after build)
  # ──────────────────────────────────────────────
  coverage:
    name: Code Coverage
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Run tests with JaCoCo coverage
        run: ./mvnw jacoco:prepare-agent verify jacoco:report -B -ntp -Dspotbugs.skip=true

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage-reports
          path: '**/target/site/jacoco/'
          retention-days: 14
