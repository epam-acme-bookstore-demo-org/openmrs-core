# CI pipeline for OpenMRS Core modernisation branches.
# Runs build, code-quality checks, and coverage on every push to
# modernisation-related branches and on pull requests to master.
#
# NOTE: dependency-check is intentionally excluded — it runs in a
# dedicated scheduled workflow (dependency-check.yml).

name: CI – Modernisation Branches

on:
  push:
    branches:
      - 'phase/*'
      - 'feature/*'
      - 'fix/*'
      - 'modernisation/*'
  pull_request:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  JAVA_VERSION: '21'
  JAVA_DISTRIBUTION: temurin
  MAVEN_OPTS: -Xmx1024m

jobs:
  # ──────────────────────────────────────────────
  # 1. Build & unit tests
  # ──────────────────────────────────────────────
  build:
    name: Build & Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Setup Java & Maven
        uses: ./.github/actions/setup-maven
        with:
          java-version: '${{ env.JAVA_VERSION }}'
          distribution: '${{ env.JAVA_DISTRIBUTION }}'

      - name: Build and run tests
        run: ./mvnw verify -B -ntp -Dspotbugs.skip=true

  # ──────────────────────────────────────────────
  # 2. Checkstyle  (source-only — no build dependency)
  # ──────────────────────────────────────────────
  checkstyle:
    name: Checkstyle
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Setup Java & Maven
        uses: ./.github/actions/setup-maven
        with:
          java-version: '${{ env.JAVA_VERSION }}'
          distribution: '${{ env.JAVA_DISTRIBUTION }}'

      - name: Run Checkstyle
        run: ./mvnw checkstyle:check -B -ntp -Dcheckstyle.failOnViolation=false

  # ──────────────────────────────────────────────
  # 3. SpotBugs  (needs compiled bytecode → after build)
  # ──────────────────────────────────────────────
  spotbugs:
    name: SpotBugs
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Setup Java & Maven
        uses: ./.github/actions/setup-maven
        with:
          java-version: '${{ env.JAVA_VERSION }}'
          distribution: '${{ env.JAVA_DISTRIBUTION }}'

      - name: Compile and run SpotBugs
        run: ./mvnw compile com.github.spotbugs:spotbugs-maven-plugin:check -B -ntp -Dspotbugs.skip=false -pl api,web,liquibase

  # ──────────────────────────────────────────────
  # 4. Code coverage with JaCoCo  (after build)
  # ──────────────────────────────────────────────
  coverage:
    name: Code Coverage
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Setup Java & Maven
        uses: ./.github/actions/setup-maven
        with:
          java-version: '${{ env.JAVA_VERSION }}'
          distribution: '${{ env.JAVA_DISTRIBUTION }}'

      - name: Run tests with JaCoCo coverage
        run: ./mvnw org.jacoco:jacoco-maven-plugin:prepare-agent verify org.jacoco:jacoco-maven-plugin:report -B -ntp -Dspotbugs.skip=true

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage-reports
          path: '**/target/site/jacoco/'
          retention-days: 14
